services:
  frontend:
    build:
      context: ./my-app
      dockerfile: ./docker/Dockerfile
    ports:
      - "3000:8080" 
    depends_on:
      - backend
    env_file:
      - ./my-app/.env

  
  backend:
    build:
      context: ./node_runtime
      dockerfile: ./docker/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    env_file:
      - ./node_runtime/.env
