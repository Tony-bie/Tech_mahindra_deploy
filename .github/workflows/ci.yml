name: CI — TechMahindra PMS

# Corre en cada PR hacia main y en cada push directo a main
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela runs anteriores del mismo branch si llega uno nuevo
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project/my-app

    steps:
      # Descarga el código del repo
      - name: Checkout
        uses: actions/checkout@v4

      # Instala Node 20 y usa cache para no bajar npm cada vez
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: project/my-app/package-lock.json

      # Instala dependencias exactas del package-lock
      - name: Instalar dependencias
        run: npm ci

      # Detecta errores de sintaxis y reglas ESLint
      - name: Lint
        run: npm run lint --if-present

      # Compila el bundle de produccion — falla si hay errores de JS/JSX
      - name: Build
        run: npm run build
        env:
          CI: true
          REACT_APP_API_URL: http://localhost:8080

  backend:
    name: Backend (Express)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project/node_runtime

    steps:
      # Descarga el codigo del repo
      - name: Checkout
        uses: actions/checkout@v4

      # Instala Node 20 con cache
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: project/node_runtime/package-lock.json

      # Instala dependencias exactas del package-lock
      - name: Instalar dependencias
        run: npm ci

      # Valida que app.js (y sus imports) no tengan errores de sintaxis Node
      - name: Verificar sintaxis
        run: node --check src/app.js
